name: Daily Job Scraper & Report Generator

on:
  schedule:
    # Runs every hour at minute 25 (non-peak minute to avoid GitHub Actions queue delays)
    - cron: '25 * * * *'
  workflow_dispatch: # Allows manual execution from GitHub UI

permissions:
  contents: write

jobs:
  scrape-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Fetch all history so git commit and push works correctly
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Generate Daily Reports
        run: |
          python3 tools/job-search/generate_daily_reports.py

      - name: Set today's date in ICT
        run: |
          echo "TODAY_DATE=$(python3 -c "from datetime import datetime, timezone, timedelta; print(datetime.now(timezone(timedelta(hours=7))).strftime('%Y-%m-%d'))")" >> $GITHUB_ENV
          echo "RUN_TIME=$(python3 -c "from datetime import datetime, timezone, timedelta; print(datetime.now(timezone(timedelta(hours=7))).strftime('%H:%M:%S'))")" >> $GITHUB_ENV
          echo "RUN_COUNT=$(python3 -c "from datetime import datetime, timezone, timedelta; h = datetime.now(timezone(timedelta(hours=7))).hour; print(h if h > 0 else 24)")" >> $GITHUB_ENV

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add reports/
          # Only commit and push if there are modified/new files in reports/
          if ! git diff --cached --quiet; then
            git commit -m "auto: update daily job search reports for ${{ env.TODAY_DATE }}"
            git pull --rebase origin ${{ github.ref_name }}
            git push
            echo "CHANGES_DETECTED=true" >> $GITHUB_ENV
          else
            echo "No new changes to commit."
            echo "CHANGES_DETECTED=false" >> $GITHUB_ENV
          fi

      - name: Send Telegram Notification (When changes detected)
        if: env.CHANGES_DETECTED == 'true'
        run: |
          # 1. Send text message notification
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_TO }}" \
            -d "text=🌅 [Lần thứ ${{ env.RUN_COUNT }} trong ngày] Hệ thống tự động quét đã chạy và phát hiện thay đổi mới trong báo cáo tuyển dụng ngày ${{ env.TODAY_DATE }} lúc ${{ env.RUN_TIME }}. Vui lòng xem 3 file báo cáo chi tiết được gửi đính kèm bên dưới!"
          
          # 2. Upload job-search.md
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendDocument" \
            -F "chat_id=${{ secrets.TELEGRAM_TO }}" \
            -F "document=@reports/${{ env.TODAY_DATE }}/job-search.md" \
            -F "caption=📄 Báo cáo phân tích chuyên sâu & hạn nộp (${{ env.TODAY_DATE }})"
            
          # 3. Upload vietnam-jobs-scan.md
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendDocument" \
            -F "chat_id=${{ secrets.TELEGRAM_TO }}" \
            -F "document=@reports/${{ env.TODAY_DATE }}/vietnam-jobs-scan.md" \
            -F "caption=📄 Bảng quét thô hợp nhất LinkedIn, Ybox, ITviec"
            
          # 4. Upload linkedin-scan.md
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendDocument" \
            -F "chat_id=${{ secrets.TELEGRAM_TO }}" \
            -F "document=@reports/${{ env.TODAY_DATE }}/linkedin-scan.md" \
            -F "caption=📄 Chi tiết danh sách quét từ LinkedIn"

      - name: Send Telegram Notification (When no changes)
        if: env.CHANGES_DETECTED == 'false'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_TO }}" \
            -d "text=🔍 [Lần thứ ${{ env.RUN_COUNT }} trong ngày] Hệ thống đã tự động chạy quét lúc ${{ env.RUN_TIME }} (${{ env.TODAY_DATE }}) nhưng không phát hiện thay đổi hay tin tuyển dụng mới nào."
